<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Logistics Router — Greenfield Food Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:   #1A3A2A;
      --forest-mid: #2C5440;
      --forest-light: #3D7055;
      --parchment: #F7F4EE;
      --parchment-dark: #EDE9E0;
      --amber:    #E8A020;
      --amber-dark: #C4841A;
      --slate:    #4A5568;
      --slate-light: #718096;
      --error:    #C0392B;
      --white:    #FFFFFF;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--forest);
      color: var(--parchment);
      font-family: var(--sans);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      background: var(--forest);
      border-bottom: 1px solid var(--forest-light);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--amber);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { display: block; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--parchment);
    }

    .header-text p {
      font-size: 11px;
      color: var(--forest-light);
      font-family: var(--mono);
      margin-top: 1px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--amber);
      background: rgba(232,160,32,0.12);
      border: 1px solid rgba(232,160,32,0.3);
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    /* ── MAIN LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      height: calc(100vh - 73px);
      min-height: 500px;
    }

    /* ── PANELS ── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 24px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate-light);
    }

    .panel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .panel-dot.raw   { background: var(--slate-light); }
    .panel-dot.clean { background: var(--amber); }

    .panel-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── LEFT PANEL: RAW INTAKE ── */
    .panel-left {
      background: #111E17;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    #raw-notes {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--parchment);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      padding: 20px 24px;
      caret-color: var(--amber);
    }

    #raw-notes::placeholder {
      color: #3D5448;
      font-style: italic;
    }

    #raw-notes:focus { outline: none; }

    /* ── CENTRE SPINE ── */
    .spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 96px;
      flex-shrink: 0;
      background: var(--forest);
      padding: 24px 0;
      border-left: 1px solid rgba(255,255,255,0.04);
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .spine-line {
      width: 1px;
      flex: 1;
      background: linear-gradient(to bottom, transparent, var(--forest-light) 30%, var(--forest-light) 70%, transparent);
    }

    #process-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--amber);
      color: var(--forest);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
      box-shadow: 0 0 0 0 rgba(232,160,32,0);
      flex-shrink: 0;
    }

    #process-btn:hover:not(:disabled) {
      background: var(--amber-dark);
      transform: scale(1.07);
      box-shadow: 0 0 24px rgba(232,160,32,0.35);
    }

    #process-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    #process-btn:disabled {
      background: var(--forest-mid);
      cursor: not-allowed;
      opacity: 0.7;
    }

    #process-btn svg { display: block; transition: opacity 0.2s; }

    .btn-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate-light);
      text-align: center;
      line-height: 1.4;
    }

    /* ── RIGHT PANEL: OUTPUT ── */
    .panel-right {
      background: var(--parchment);
    }

    .panel-right .panel-header { border-bottom-color: rgba(0,0,0,0.08); }
    .panel-right .panel-label { color: var(--slate); }

    #output-area {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px 24px 32px;
      color: var(--slate);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.45;
      user-select: none;
    }

    .empty-state svg { opacity: 0.5; }

    .empty-state p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--slate);
      text-align: center;
      line-height: 1.6;
    }

    /* Error state */
    .error-msg {
      background: #fdf2f2;
      border-left: 3px solid var(--error);
      padding: 12px 16px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--error);
      line-height: 1.6;
      margin: 20px 0;
    }

    /* ── MARKDOWN RENDERING ── */
    .md-output { animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .md-output h1, .md-output h2, .md-output h3 {
      font-family: var(--sans);
      color: var(--forest);
      margin-bottom: 10px;
      margin-top: 20px;
      font-weight: 700;
    }
    .md-output h1 { font-size: 18px; }
    .md-output h2 { font-size: 15px; border-bottom: 1px solid var(--parchment-dark); padding-bottom: 6px; }
    .md-output h3 { font-size: 13px; color: var(--forest-mid); }

    .md-output p {
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 10px;
      color: var(--slate);
    }

    .md-output table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      margin: 14px 0;
      font-family: var(--mono);
    }

    .md-output table thead tr {
      background: var(--forest);
      color: var(--parchment);
    }

    .md-output table thead th {
      padding: 9px 12px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-size: 11px;
      text-transform: uppercase;
    }

    .md-output table tbody tr {
      border-bottom: 1px solid var(--parchment-dark);
    }

    .md-output table tbody tr:nth-child(even) {
      background: rgba(0,0,0,0.025);
    }

    .md-output table tbody td {
      padding: 8px 12px;
      color: var(--slate);
      vertical-align: top;
    }

    .md-output ul, .md-output ol {
      padding-left: 20px;
      margin-bottom: 10px;
    }

    .md-output li {
      font-size: 13px;
      line-height: 1.7;
      color: var(--slate);
      margin-bottom: 3px;
    }

    .md-output code {
      font-family: var(--mono);
      background: var(--parchment-dark);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--forest);
    }

    .md-output strong { color: var(--forest); font-weight: 600; }
    .md-output em { font-style: italic; color: var(--slate-light); }

    .md-output hr {
      border: none;
      border-top: 1px solid var(--parchment-dark);
      margin: 18px 0;
    }

    /* ── LOADING SPINNER ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 100%;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--parchment-dark);
      border-top-color: var(--forest);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-wrap p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--slate-light);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }

    /* ── COPY BUTTON ── */
    .output-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    #copy-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--parchment-dark);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 11px;
      font-family: var(--sans);
      font-weight: 500;
      color: var(--slate);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0.03em;
    }

    #copy-btn:hover { background: var(--parchment-dark); border-color: var(--slate-light); }
    #copy-btn.copied { color: var(--forest); border-color: var(--forest-light); background: rgba(61,112,85,0.1); }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto 1fr;
        height: auto;
        min-height: calc(100vh - 73px);
      }
      .spine {
        width: 100%;
        flex-direction: row;
        height: 72px;
        padding: 0 24px;
      }
      .spine-line {
        width: auto;
        height: 1px;
        flex: 1;
        background: linear-gradient(to right, transparent, var(--forest-light) 30%, var(--forest-light) 70%, transparent);
      }
      .panel { min-height: 300px; }
      #raw-notes { min-height: 280px; }
      #output-area { min-height: 300px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .md-output, .spinner, .spinner-wrap p { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 2L4 6v8l6 4 6-4V6L10 2z" stroke="#1A3A2A" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M10 2v12M4 6l6 4 6-4" stroke="#1A3A2A" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Community Logistics Router</h1>
    <p>Greenfield Food Bank · Dispatch Operations</p>
  </div>
  <span class="header-badge">AI-Assisted</span>
</header>

<main>
  <!-- LEFT: RAW INTAKE -->
  <div class="panel panel-left">
    <div class="panel-header">
      <span class="panel-dot raw"></span>
      <span class="panel-label">Raw Volunteer &amp; Supply Notes</span>
    </div>
    <div class="panel-body">
      <textarea id="raw-notes" spellcheck="false" placeholder="Paste messy notes here, e.g.

Maria can drive tuesday 9am-1pm she has a van can carry 400lbs
Tom - wed + fri mornings only, no car
pickup from St. Lukes: 80 cans beans 40 jars peanut butter expires oct
Riverside Community Center needs 60 meal kits by friday EOD
URGENT: 200 lbs potatoes at warehouse dock 3 need moving before Thursday 6pm
jenny volunteers saturdays 8-12 has small hatchback
Eastside Pantry - weekly allocation: rice (50lb) pasta (30lb)"></textarea>
    </div>
  </div>

  <!-- CENTRE SPINE -->
  <div class="spine">
    <div class="spine-line"></div>
    <button id="process-btn" title="Process notes into structured table" aria-label="Process notes">
      <svg id="btn-icon-arrow" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 4l7 7-7 7M4 11h14" stroke="#1A3A2A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="btn-icon-stop" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <rect x="4" y="4" width="10" height="10" rx="2" fill="#1A3A2A"/>
      </svg>
    </button>
    <span class="btn-label">Process<br>Notes</span>
    <div class="spine-line"></div>
  </div>

  <!-- RIGHT: CLEAN OUTPUT -->
  <div class="panel panel-right">
    <div class="panel-header">
      <span class="panel-dot clean"></span>
      <span class="panel-label">Structured Logistics Output</span>
    </div>
    <div class="panel-body">
      <div id="output-area">
        <div class="empty-state" id="empty-state">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="28" height="20" rx="3" stroke="#4A5568" stroke-width="1.5"/>
            <path d="M4 14h28" stroke="#4A5568" stroke-width="1.2"/>
            <path d="M4 20h28M4 26h16" stroke="#4A5568" stroke-width="1" stroke-dasharray="3 2"/>
          </svg>
          <p>Paste messy notes on the left,<br>then hit the button to route &amp; structure them.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────

  const SYSTEM_PROMPT = `You are a logistics coordinator assistant for a community food bank. 
Your job is to parse raw, unstructured volunteer and supply notes and output clean, 
actionable Markdown tables.

You must extract and organise all information into the following sections, each rendered as a Markdown table:

## 1. Volunteer Availability
| Name | Available Days | Time Window | Transport | Capacity | Notes |
(Extract every volunteer mention, their days, hours, vehicle type if any, and estimated carry capacity.)

## 2. Supply Pickups
| Item | Quantity | Source Location | Deadline / Expiry | Priority | Notes |
(Extract all items to be collected, where from, and any time constraints. Mark URGENT if indicated.)

## 3. Delivery Requirements
| Recipient Organisation | Items Needed | Quantity | Deadline | Priority | Notes |
(Extract all delivery destinations, what they need, and when.)

## 4. Action Items
| Priority | Task | Assigned To (if known) | Deadline | Status |
(Synthesise a short list of the most time-sensitive tasks derived from the above.)

Rules:
- Use "—" for any field where data is not provided.
- Mark time-sensitive rows in the Notes column with 🔴 URGENT or 🟡 SOON as appropriate.
- After the tables, add a brief ## Summary paragraph (3–5 sentences) highlighting the most critical logistics needs.
- Output Markdown only. No preamble, no code fences, no commentary outside the Markdown structure.`;

  // ── STATE ───────────────────────────────────────────────────────────────────

  let abortController = null;
  let rawMarkdown = '';

  // ── DOM REFS ────────────────────────────────────────────────────────────────

  const textarea   = document.getElementById('raw-notes');
  const processBtn = document.getElementById('process-btn');
  const outputArea = document.getElementById('output-area');
  const iconArrow  = document.getElementById('btn-icon-arrow');
  const iconStop   = document.getElementById('btn-icon-stop');

  // ── HELPERS ─────────────────────────────────────────────────────────────────

  function setProcessing(active) {
    processBtn.disabled = false; // always clickable (to stop)
    iconArrow.style.display = active ? 'none'  : 'block';
    iconStop.style.display  = active ? 'block' : 'none';
    processBtn.title = active ? 'Stop processing' : 'Process notes into structured table';
    processBtn.setAttribute('aria-label', active ? 'Stop processing' : 'Process notes');
  }

  function showSpinner() {
    outputArea.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p>Routing logistics data…</p>
      </div>`;
  }

  function showEmpty() {
    outputArea.innerHTML = `
      <div class="empty-state" id="empty-state">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="28" height="20" rx="3" stroke="#4A5568" stroke-width="1.5"/>
          <path d="M4 14h28" stroke="#4A5568" stroke-width="1.2"/>
          <path d="M4 20h28M4 26h16" stroke="#4A5568" stroke-width="1" stroke-dasharray="3 2"/>
        </svg>
        <p>Paste messy notes on the left,<br>then hit the button to route &amp; structure them.</p>
      </div>`;
  }

  function showError(msg) {
    outputArea.innerHTML = `<div class="error-msg">⚠ ${escapeHtml(msg)}</div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── MINIMAL MARKDOWN PARSER ─────────────────────────────────────────────────
  // Handles: headings, tables, bold, italic, inline code, hr, ul/ol, paragraphs

  function renderMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];

      // Heading
      const hm = line.match(/^(#{1,3})\s+(.+)/);
      if (hm) {
        const lvl = hm[1].length;
        html += `<h${lvl}>${inlineFormat(hm[2])}</h${lvl}>`;
        i++; continue;
      }

      // HR
      if (/^---+$/.test(line.trim())) {
        html += '<hr>'; i++; continue;
      }

      // Table
      if (line.startsWith('|') && i + 1 < lines.length && /^\|[-| :]+\|/.test(lines[i + 1])) {
        const headers = parseTableRow(line);
        i += 2; // skip separator
        let rows = [];
        while (i < lines.length && lines[i].startsWith('|')) {
          rows.push(parseTableRow(lines[i]));
          i++;
        }
        html += '<table><thead><tr>';
        headers.forEach(h => html += `<th>${inlineFormat(h)}</th>`);
        html += '</tr></thead><tbody>';
        rows.forEach(row => {
          html += '<tr>';
          row.forEach(cell => html += `<td>${inlineFormat(cell)}</td>`);
          html += '</tr>';
        });
        html += '</tbody></table>';
        continue;
      }

      // Unordered list
      if (/^[-*]\s/.test(line)) {
        html += '<ul>';
        while (i < lines.length && /^[-*]\s/.test(lines[i])) {
          html += `<li>${inlineFormat(lines[i].replace(/^[-*]\s/, ''))}</li>`;
          i++;
        }
        html += '</ul>'; continue;
      }

      // Ordered list
      if (/^\d+\.\s/.test(line)) {
        html += '<ol>';
        while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
          html += `<li>${inlineFormat(lines[i].replace(/^\d+\.\s/, ''))}</li>`;
          i++;
        }
        html += '</ol>'; continue;
      }

      // Blank line
      if (line.trim() === '') { i++; continue; }

      // Paragraph
      html += `<p>${inlineFormat(line)}</p>`;
      i++;
    }
    return html;
  }

  function parseTableRow(line) {
    return line.split('|').slice(1, -1).map(c => c.trim());
  }

  function inlineFormat(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/🔴/g, '🔴')
      .replace(/🟡/g, '🟡');
  }

  function renderOutput(markdown) {
    rawMarkdown = markdown;
    const html = renderMarkdown(markdown);
    outputArea.innerHTML = `
      <div class="output-actions">
        <button id="copy-btn" title="Copy Markdown to clipboard">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Copy Markdown
        </button>
      </div>
      <div class="md-output">${html}</div>`;

    document.getElementById('copy-btn').addEventListener('click', copyMarkdown);
  }

  async function copyMarkdown() {
    try {
      await navigator.clipboard.writeText(rawMarkdown);
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Copy Markdown`;
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      showError('Could not access clipboard. Please copy manually.');
    }
  }

  // ── API CALL (streaming) ─────────────────────────────────────────────────────

  async function processNotes() {
    // If currently processing, abort
    if (abortController) {
      abortController.abort();
      abortController = null;
      setProcessing(false);
      return;
    }

    const raw = textarea.value.trim();
    if (!raw) {
      textarea.focus();
      textarea.style.outline = '1px solid var(--amber)';
      setTimeout(() => textarea.style.outline = '', 1200);
      return;
    }

    const userContent = `<raw_intake>\n${raw}\n</raw_intake>`;

    abortController = new AbortController();
    setProcessing(true);
    showSpinner();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userContent }],
          stream: true
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      // Stream response
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let accumulated = '';
      let streamStarted = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const event = JSON.parse(data);
            if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
              accumulated += event.delta.text;
              if (!streamStarted) {
                streamStarted = true;
                outputArea.innerHTML = '';
              }
              renderOutput(accumulated);
            }
          } catch { /* skip malformed events */ }
        }
      }

      if (!streamStarted || !accumulated.trim()) {
        showEmpty();
      }

    } catch (err) {
      if (err.name === 'AbortError') {
        if (!rawMarkdown) showEmpty();
      } else {
        showError(`Could not process notes: ${err.message}`);
      }
    } finally {
      abortController = null;
      setProcessing(false);
    }
  }

  // ── EVENT LISTENERS ──────────────────────────────────────────────────────────

  processBtn.addEventListener('click', processNotes);

  textarea.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      processNotes();
    }
  });
</script>
</body>
</html>
